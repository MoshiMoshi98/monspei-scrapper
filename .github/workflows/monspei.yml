name: MONSPEI — Monitor SPEI

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitorear:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Crear carpeta salidas
        run: mkdir -p salidas

      - name: Correr scrapper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          GMAIL_PARA: ${{ secrets.GMAIL_PARA }}
        run: node scrapper.js

      - name: Guardar archivos en repo
        run: |
          git config user.name  "bot-monspei"
          git config user.email "bot@monspei.local"
          git add -f salidas/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "auto: update SPEI $(date +'%d/%m/%Y %H:%M')"
          git push origin main
          
